name: Build Paper Plugin

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # Step 1: Check out your repository code
    - name: Checkout Code
      uses: actions/checkout@v4

    # Step 2: Set up Java JDK 21 (Required for 1.21.1)
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    # Step 3: Compile and package the code into a Jar
    - name: Build with Maven
      run: mvn -B package --file pom.xml

    # Step 4: Upload the compiled Jar so you can download it from GitHub
    - name: Upload Compiled Jar
      uses: actions/upload-artifact@v4
      with:
        name: NoPluginsFound-Jar
        path: target/*.jar
